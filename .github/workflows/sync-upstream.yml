name: Sync upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */6 * * *"

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge upstream main
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/addyosmani/agent-skills.git
          git fetch upstream main
          before="$(git rev-parse HEAD)"
          if ! git merge --no-edit upstream/main; then
            git merge --abort
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "conflict=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Upstream sync hit a merge conflict. Resolve locally, then push the merge."
            exit 0
          fi
          git restore --source="$before" -- .github/workflows || true
          if git diff --quiet && git diff --cached --quiet; then
            git reset --hard "$before"
          elif ! git diff --quiet -- .github/workflows || ! git diff --cached --quiet -- .github/workflows; then
            git add .github/workflows
            git commit -m "chore: keep fork workflow files"
          fi
          after="$(git rev-parse HEAD)"
          if [ "$before" != "$after" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "conflict=false" >> "$GITHUB_OUTPUT"

      - name: Bump Cursor plugin version
        if: steps.merge.outputs.changed == 'true'
        run: |
          node scripts/bump-cursor-plugin-version.js
          git add .cursor-plugin/plugin.json
          git commit -m "chore: bump Cursor plugin version"

      - name: Set up Bun
        if: steps.merge.outputs.conflict != 'true'
        uses: oven-sh/setup-bun@v2

      - name: Check plugin adapters
        if: steps.merge.outputs.conflict != 'true'
        run: |
          node scripts/validate-skills.js
          bun hooks/cursor-session-start.js >/tmp/cursor-session-start.json
          node -e "JSON.parse(require('fs').readFileSync('/tmp/cursor-session-start.json', 'utf8'))"

      - name: Push synced fork
        if: steps.merge.outputs.conflict != 'true'
        run: |
          git fetch origin main
          git merge --no-edit origin/main
          git push origin HEAD:main
